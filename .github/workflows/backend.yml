name: Backend CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version:
          - "3.14"

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: memovi
          POSTGRES_USER: memovi_app
          POSTGRES_PASSWORD: memovi_local_pg_9f4c8e2d7a6b41c3
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U memovi_app -d memovi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check .

      - name: Black
        run: uv run black --check .

      - name: MyPy
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          # Typecheck application/package source only. Tests and scripts are
          # exercised by pytest; shared test filenames also collide as modules.
          python_files = [
              path
              for path in subprocess.check_output(
                  ["git", "ls-files", "*.py", "*.pyi"],
                  text=True,
              ).splitlines()
              if not Path(path).parts[0].startswith(".")
              and "tests" not in Path(path).parts
              and "scripts" not in Path(path).parts
          ]

          if not python_files:
              print("No Python files found; skipping MyPy until backend code exists.")
              sys.exit(0)

          sys.exit(subprocess.call(["uv", "run", "mypy", *python_files]))
          PY

      - name: Pytest
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: memovi
          POSTGRES_USER: memovi_app
          POSTGRES_PASSWORD: memovi_local_pg_9f4c8e2d7a6b41c3
        run: |
          set +e
          uv run pytest
          status=$?
          set -e

          if [ "$status" -eq 5 ]; then
            echo "No tests collected; treating empty test suite as valid for the initial workspace."
            exit 0
          fi

          exit "$status"
