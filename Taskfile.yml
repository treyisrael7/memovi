version: "3"

vars:
  WEB_PACKAGE: "@memovi/web"
  PNPM_VERSION: "10.33.4"
  BACKEND_PYTHONPATH: "apps/api/src;packages/auth/src;packages/config/src;packages/connectors/src;packages/contracts/src;packages/documents/src;packages/intelligence/src;packages/memory/src;packages/observability/src;packages/search/src;packages/shared/src"

tasks:
  setup:
    desc: Install repository dependencies and Git hooks.
    cmds:
      - corepack enable
      - corepack prepare pnpm@{{.PNPM_VERSION}} --activate
      - uv sync --all-groups --package memovi-api
      - pnpm install --frozen-lockfile
      - uv run pre-commit install

  backend:
    desc: Start local infrastructure and the backend API development server.
    deps:
      - docker-up
    env:
      PYTHONPATH: "{{.BACKEND_PYTHONPATH}}"
    cmds:
      - uv run uvicorn api.main:app --host 127.0.0.1 --port 8000 --reload --app-dir apps/api/src

  backend:dev:
    desc: Alias for `task backend`.
    cmds:
      - task: backend

  backend:check:
    desc: Run all backend validation tasks.
    deps:
      - backend:lint
      - backend:format-check
      - backend:typecheck
      - backend:test

  backend:process:
    desc: Process a pending document job by processing_job_id (local dev).
    deps:
      - docker-up
    env:
      PYTHONPATH: "{{.BACKEND_PYTHONPATH}}"
    cmds:
      - uv run --group runtime python scripts/process_document.py {{.CLI_ARGS}}
    requires:
      vars: [CLI_ARGS]

  frontend:
    desc: Run all frontend validation tasks.
    deps:
      - frontend:lint
      - frontend:format-check
      - frontend:typecheck
      - frontend:build

  docker-up:
    desc: Start local infrastructure services.
    cmds:
      - docker compose up -d

  docker-down:
    desc: Stop local infrastructure services.
    cmds:
      - docker compose down

  db:migrate:
    desc: Apply database migrations (starts Docker if needed).
    deps:
      - docker-up
    cmds:
      - docker compose up -d --wait postgres
      - uv run --group runtime alembic upgrade head

  lint:
    desc: Run backend and frontend linters.
    deps:
      - backend:lint
      - frontend:lint

  format:
    desc: Format backend and frontend files.
    deps:
      - backend:format
      - frontend:format

  typecheck:
    desc: Run backend and frontend type checks.
    deps:
      - backend:typecheck
      - frontend:typecheck

  test:
    desc: Run tests.
    deps:
      - backend:test

  dev:
    desc: Start local infrastructure and the frontend development server.
    deps:
      - docker-up
    cmds:
      - pnpm --filter {{.WEB_PACKAGE}} dev

  backend:lint:
    desc: Run Ruff for Python code.
    cmds:
      - uv run ruff check .

  backend:format:
    desc: Format Python code with Black and Ruff fixes.
    cmds:
      - uv run ruff check --fix .
      - uv run black .

  backend:format-check:
    desc: Check Python formatting with Black.
    cmds:
      - uv run black --check .

  backend:typecheck:
    desc: Run MyPy when Python files exist.
    cmds:
      - >-
        python -c "from pathlib import Path; import subprocess, sys;
        files = [path for path in subprocess.check_output(['git', 'ls-files', '--cached', '--others', '--exclude-standard', '*.py', '*.pyi'], text=True).splitlines() if Path(path).exists() and not Path(path).parts[0].startswith('.')];
        print('No Python files found; skipping MyPy.') if not files else None;
        sys.exit(0 if not files else subprocess.call(['uv', 'run', 'mypy', *files]))"

  backend:test:
    desc: Run Pytest when tests exist.
    cmds:
      - >-
        python -c "import subprocess, sys;
        status = subprocess.call(['uv', 'run', 'pytest']);
        print('No tests collected; treating empty test suite as valid for the initial workspace.') if status == 5 else None;
        sys.exit(0 if status == 5 else status)"

  frontend:lint:
    desc: Run ESLint for the web app.
    cmds:
      - pnpm --filter {{.WEB_PACKAGE}} lint

  frontend:format:
    desc: Format the web app with Prettier.
    cmds:
      - pnpm --filter {{.WEB_PACKAGE}} format

  frontend:format-check:
    desc: Check web app formatting with Prettier.
    cmds:
      - pnpm --filter {{.WEB_PACKAGE}} format:check

  frontend:typecheck:
    desc: Run TypeScript checks for the web app.
    cmds:
      - pnpm --filter {{.WEB_PACKAGE}} typecheck

  frontend:build:
    desc: Build the web app.
    cmds:
      - pnpm --filter {{.WEB_PACKAGE}} build
