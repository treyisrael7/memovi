[project]
name = "memovi-auth"
version = "0.1.0"
description = "Authentication and authorization domain boundary. This package will own identity-related domain, application, infrastructure, API, and event contracts when Milestone 2 begins."
requires-python = ">=3.14"
dependencies = [
    "fastapi",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/auth",
]

[tool.uv]
package = true
