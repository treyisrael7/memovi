[project]
name = "memovi-automation"
version = "0.1.0"
description = "Capability Framework for Memovi. Owns capability abstractions, registry, permissions, invocation contracts, and execution context. Concrete capabilities and automation orchestration are out of scope for this package foundation."
requires-python = ">=3.14"
dependencies = [
    "fastapi",
    "memovi-shared",
]

[tool.uv.sources]
memovi-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/memovi_automation",
]

[tool.uv]
package = true
