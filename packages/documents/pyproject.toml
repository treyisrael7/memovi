[project]
name = "memovi-documents"
version = "0.1.0"
description = "Document ingestion and document lifecycle domain boundary."
requires-python = ">=3.14"
dependencies = [
    "boto3",
    "fastapi",
    "memovi-shared",
    "pypdf",
    "python-multipart",
    "sqlalchemy>=2",
]

[tool.uv.sources]
memovi-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/documents",
]

[tool.uv]
package = true
