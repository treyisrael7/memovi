[project]
name = "memovi-intelligence"
version = "0.1.0"
description = "Intelligence domain boundary. This package owns AI-facing orchestration, provider boundaries, API contracts, and events while keeping durable knowledge independent from model providers."
requires-python = ">=3.14"
dependencies = [
    "fastapi",
    "memovi-shared",
    "openai>=1.0",
    "sqlalchemy>=2",
]

[tool.uv.sources]
memovi-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/memovi_intelligence",
]

[tool.uv]
package = true
