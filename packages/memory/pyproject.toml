[project]
name = "memovi-memory"
version = "0.1.0"
description = "Memory and knowledge organization domain boundary."
requires-python = ">=3.14"
dependencies = [
    "fastapi",
    "memovi-observability",
    "memovi-shared",
    "sqlalchemy>=2",
]

[tool.uv.sources]
memovi-observability = { workspace = true }
memovi-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/memovi_memory",
]

[tool.uv]
package = true
