[project]
name = "memovi-models"
version = "0.1.0"
description = "Model Provider Framework for Memovi. Owns provider-neutral model abstractions, registry, metadata, configuration, capability discovery, health checks, and error normalization. Concrete vendor adapters are out of scope for this foundation."
requires-python = ">=3.14"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/memovi_models",
]

[tool.uv]
package = true
