[project]
name = "memovi-observability"
version = "0.1.0"
description = "Cross-cutting logging, tracing, metrics, and request-context boundaries for Memovi."
requires-python = ">=3.14"
dependencies = [
    "memovi-shared",
    "opentelemetry-api",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/memovi_observability",
]

[tool.uv]
package = true

[tool.uv.sources]
memovi-shared = { workspace = true }
