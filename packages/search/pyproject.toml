[project]
name = "memovi-search"
version = "0.1.0"
description = "Search and retrieval domain boundary."
requires-python = ">=3.14"
dependencies = [
    "fastapi",
    "memovi-observability",
    "memovi-shared",
    "pgvector",
    "sqlalchemy>=2",
]

[tool.uv.sources]
memovi-observability = { workspace = true }
memovi-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/memovi_search",
]

[tool.uv]
package = true
