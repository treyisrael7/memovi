[project]
name = "memovi-shared"
version = "0.1.0"
description = "Shared low-level utilities and primitives that are genuinely cross-cutting across Memovi. Domain-specific behavior should stay in the owning package, not here."
requires-python = ">=3.14"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/memovi_shared",
]

[tool.uv]
package = true
