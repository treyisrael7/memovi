[project]
name = "memovi-workspace"
version = "0.1.0"
description = "Workspace ownership domain boundary. Owns workspace lifecycle while other domains reference WorkspaceId only."
requires-python = ">=3.14"
dependencies = [
    "fastapi",
    "memovi-observability",
    "memovi-shared",
    "sqlalchemy>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/memovi_workspace",
]

[tool.uv]
package = true

[tool.uv.sources]
memovi-observability = { workspace = true }
memovi-shared = { workspace = true }
